services:
  - type: web
    name: arnav-portfolio-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DEBUG
        value: false
      - key: ALLOWED_ORIGINS
        value: '["https://your-frontend.vercel.app"]'
      - key: INGEST_SECRET_KEY
        generateValue: true
    autoDeploy: true
    plan: free
